<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>คำนวณคะแนน (Smart Leveling)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    /* --- CSS STYLES --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #0288d1 0%, #01579b 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; min-height: 100vh; padding: 10px; padding-bottom: 40px; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 5px; }
    
    .header { text-align: center; color: white; margin-bottom: 20px; padding: 20px 0; }
    #profile img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header h1 { margin: 10px 0; font-size: 1.8rem; font-weight: 600; }
    
    /* CARDS */
    .selection-card { background: white; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; animation: fadeInUp 0.5s ease-out; }
    .card-header { background: linear-gradient(135deg, #0288d1, #0277bd); color: white; padding: 15px 20px; font-weight: 600; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
    .card-header.green { background: linear-gradient(135deg, #4caf50, #388e3c); }
    .card-body { padding: 20px; }
    
    /* INPUTS & DROPDOWNS */
    .form-group { margin-bottom: 20px; }
    .search-input { width: 100%; padding: 14px; border: 2px solid #e3f2fd; border-radius: 12px; font-size: 1rem; background: #f8faff; transition: all 0.3s ease; }
    .search-input:focus { outline: none; border-color: #0288d1; background: white; }
    .custom-dropdown { width: 100%; max-height: 250px; border: 2px solid #e3f2fd; border-radius: 12px; background: white; overflow-y: auto; margin-top: 5px; }
    .dropdown-option { padding: 14px 16px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
    .dropdown-option:hover { background-color: #e1f5fe; }
    
    /* BUTTONS */
    .navigation-buttons { display: flex; gap: 10px; margin-top: 25px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; color: white; text-align: center; }
    .btn-primary { background: linear-gradient(135deg, #0288d1, #01579b); }
    .btn-secondary { background: #78909c; color: white; }
    .btn-success { background: linear-gradient(135deg, #4caf50, #388e3c); box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3); }
    .btn-restart { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; }
    .btn:disabled { background: #cfd8dc; cursor: not-allowed; opacity: 0.7; }
    
    /* STEP 4: TEST LINKS */
    .test-list { display: grid; gap: 15px; }
    .test-item { background: white; border: 2px solid #e3f2fd; border-radius: 12px; padding: 20px; transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
    .test-item.clickable { border-color: #2196f3; cursor: pointer; }
    .test-item.clickable:hover { background: #e1f5fe; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(33, 150, 243, 0.2); }
    .test-item.clickable::after { content: "🔗 คลิกทำข้อสอบ"; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; color: #0288d1; font-weight: bold; background: white; padding: 5px 10px; border-radius: 15px; border: 1px solid #0288d1; }
    
    .test-name { font-weight: 700; color: #01579b; font-size: 1.1rem; margin-bottom: 5px; }
    .test-weight { color: #666; font-size: 0.9rem; }

    /* STEP 5: SCORE INPUT */
    .score-input-item { background: #f8fbff; border: 1px solid #e3f2fd; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
    .score-input-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .score-label { font-weight: 700; color: #0277bd; font-size: 1rem; }
    .score-weight { font-size: 0.85rem; background: #e1f5fe; color: #01579b; padding: 2px 8px; border-radius: 10px; }
    .score-stats { font-size: 0.8rem; color: #78909c; margin-bottom: 8px; }
    .score-input-field { width: 100%; padding: 12px; border: 2px solid #b3e5fc; border-radius: 8px; font-size: 1.1rem; text-align: center; font-weight: bold; color: #0277bd; outline: none; }
    .score-input-field:focus { border-color: #0288d1; background: white; box-shadow: 0 0 0 3px rgba(2, 136, 209, 0.1); }

    /* STEP 6: RESULTS TABLE */
    .results-table { width: 100%; margin-top: 15px; border-collapse: separate; border-spacing: 0; }
    .results-table th { background: #e3f2fd; color: #01579b; font-weight: 600; padding: 10px 5px; font-size: 0.85rem; text-align: center; border-bottom: 2px solid #0288d1; }
    .results-table th:first-child { text-align: left; padding-left: 10px; border-radius: 8px 0 0 0; }
    .results-table th:last-child { border-radius: 0 8px 0 0; }
    .results-table td { padding: 12px 5px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.9rem; vertical-align: middle; }
    .results-table td:first-child { text-align: left; padding-left: 10px; font-weight: 600; color: #333; }
    
    .col-score { color: #555; font-weight: bold; }
    .col-target { background-color: #fff8e1; color: #e65100; font-weight: bold; }
    .col-diff { color: #2e7d32; font-weight: bold; font-size: 0.85rem; }
    .col-diff.positive { color: #e65100; } 
    .col-diff.negative { color: #2e7d32; } 
    
    /* BADGES */
    .z-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; color: white; font-weight: normal; margin-left: 5px; vertical-align: middle; }
    .bg-red { background: #e53935; }
    .bg-orange { background: #fb8c00; }
    .bg-green { background: #43a047; }
    .bg-blue { background: #1e88e5; }
    .bg-gray { background: #9e9e9e; }

    /* LINK BUTTON */
    .btn-test-link { display: inline-block; margin-left: 5px; font-size: 0.8rem; text-decoration: none; background: #eee; color: #555; padding: 2px 8px; border-radius: 10px; border: 1px solid #ddd; }
    .btn-test-link.active { background: #0288d1; color: white; border-color: #0288d1; }

    .program-info { background: linear-gradient(135deg, #e3f2fd, #bbdefb); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #90caf9; }
    .summary-box { text-align: center; padding: 20px; background: #f1f8e9; border-radius: 12px; margin-bottom: 20px; border: 1px solid #c5e1a5; }
    .summary-score { font-size: 2.5rem; font-weight: 800; color: #2e7d32; margin: 5px 0; }
    .summary-fail { background: #ffebee; border-color: #ef9a9a; }
    .summary-fail .summary-score { color: #c62828; }

    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 999; display: none; backdrop-filter: blur(2px); }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0288d1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="loading" class="loading-overlay"><div class="spinner"></div></div>

  <div class="container">
    <div class="header">
      <div id="profile">
        <img id="picture" src="" alt="Profile Picture">
        <h2 id="name">Loading...</h2>
      </div>
      <h1>🎓 คำนวณคะแนน (Smart Leveling)</h1>
    </div>

    <div class="selection-card" id="card1">
      <div class="card-header"><h3>🏛️ เลือกมหาวิทยาลัย</h3></div>
      <div class="card-body">
        <div class="form-group">
          <input type="text" class="search-input" id="searchUniversity" placeholder="พิมพ์ชื่อมหาวิทยาลัย...">
          <div class="custom-dropdown" id="universityDropdown"></div>
        </div>
        <div class="navigation-buttons">
          <button class="btn btn-primary" id="nextBtn1" disabled>ถัดไป →</button>
        </div>
      </div>
    </div>

    <div class="selection-card" id="card2" style="display: none;">
      <div class="card-header"><h3>🏫 เลือกคณะ</h3></div>
      <div class="card-body">
        <div class="form-group">
          <input type="text" class="search-input" id="searchFaculty" placeholder="พิมพ์ชื่อคณะ...">
          <div class="custom-dropdown" id="facultyDropdown"></div>
        </div>
        <div class="navigation-buttons">
          <button class="btn btn-secondary" onclick="goToStep(1)">← กลับ</button>
          <button class="btn btn-primary" id="nextBtn2" disabled>ถัดไป →</button>
        </div>
      </div>
    </div>

    <div class="selection-card" id="card3" style="display: none;">
      <div class="card-header"><h3>📚 เลือกหลักสูตร</h3></div>
      <div class="card-body">
        <div class="form-group">
          <input type="text" class="search-input" id="searchProgram" placeholder="พิมพ์ชื่อหลักสูตร...">
          <div class="custom-dropdown" id="programDropdown"></div>
        </div>
        <div class="navigation-buttons">
          <button class="btn btn-secondary" onclick="goToStep(2)">← กลับ</button>
          <button class="btn btn-primary" id="showTestsBtn" disabled>ดูเกณฑ์คะแนน</button>
        </div>
      </div>
    </div>

    <div class="results-container" id="testLinkContainer" style="display: none;">
      <div class="program-info" id="programInfo"></div>
      <div class="selection-card">
        <div class="card-header"><h3>📝 รายการข้อสอบ</h3></div>
        <div class="card-body">
          <div style="text-align:center; color:#666; margin-bottom:15px; font-size:0.9rem;">
            คลิกที่วิชาเพื่อทำข้อสอบ (ถ้ามีลิงก์) เมื่อทำเสร็จแล้วกด "ไปกรอกคะแนน"
          </div>
          <div class="test-list" id="testList"></div>
          <div class="navigation-buttons">
            <button class="btn btn-secondary" onclick="goToStep(3)">← กลับ</button>
            <button class="btn btn-primary" onclick="goToScoreInput()">ไปกรอกคะแนน →</button>
          </div>
        </div>
      </div>
    </div>

    <div class="results-container" id="scoreInputContainer" style="display: none;">
      <div class="program-info" id="programInfo2"></div>
      <div class="selection-card">
        <div class="card-header green"><h3>✍️ กรอกคะแนนที่ได้</h3></div>
        <div class="card-body">
          <div id="scoreInputList"></div>
          <div class="navigation-buttons">
            <button class="btn btn-secondary" onclick="backToLinks()">← กลับไปดูลิงก์</button>
            <button class="btn btn-success" onclick="calculateSafeLeveling()">🚀 วิเคราะห์ผล</button>
          </div>
        </div>
      </div>
    </div>

    <div class="results-container" id="calculationContainer" style="display: none;">
      <div class="program-info" id="programInfo3"></div>
      <div class="selection-card">
        <div class="card-header green"><h3>📊 แผนการอัพคะแนน</h3></div>
        <div class="card-body">
          <div id="calculationResults"></div>
          <div class="navigation-buttons">
            <button class="btn btn-secondary" onclick="backToScoreInput()">← แก้ไขคะแนน</button>
            <button class="btn btn-restart" onclick="restart()">🔄 เริ่มใหม่ทั้งหมด</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- CONFIGURATION ---
    const API_BASE_URL = ""; 
    const EXAM_LINKS = {
        "tgat": "https://forms.google.com/tgat",
        "a_lv_61": "https://forms.google.com/math1",
        // Add more here...
    };

    const SUBJECT_MAPPING = {
      "gpax": "GPAX", "tgat": "TGAT รวม", "tgat1": "TGAT1 Eng", "tgat2": "TGAT2 Logic", 
      "tgat3": "TGAT3 Work", "tpat1": "TPAT1 กสพท", "tpat3": "TPAT3 Tech", 
      "a_lv_61": "Math 1", "a_lv_82": "Eng", "a_lv_64": "Physics", "a_lv_81": "Thai"
    };

    let userId = "guest_" + Math.floor(Math.random() * 100000);
    let selectedUniversity = null, selectedFaculty = null, selectedProgram = null;
    let allUniversities = [], currentFaculties = [], currentPrograms = [];
    let requiredSubjectsCache = [], programMinScore = 0, isTScoreEnabled = false;

    window.onload = async function () {
      allUniversities = ['จุฬาลงกรณ์มหาวิทยาลัย', 'มหาวิทยาลัยเกษตรศาสตร์', 'มหาวิทยาลัยขอนแก่น', 'มหาวิทยาลัยเชียงใหม่', 'มหาวิทยาลัยธรรมศาสตร์', 'มหาวิทยาลัยมหิดล', 'มหาวิทยาลัยศรีนครินทรวิโรฒ', 'มหาวิทยาลัยศิลปากร', 'มหาวิทยาลัยสงขลานครินทร์', 'สถาบันเทคโนโลยีพระจอมเกล้าเจ้าคุณทหารลาดกระบัง', 'มหาวิทยาลัยเทคโนโลยีพระจอมเกล้าพระนครเหนือ', 'มหาวิทยาลัยเทคโนโลยีสุรนารี', 'มหาวิทยาลัยบูรพา', 'มหาวิทยาลัยแม่ฟ้าหลวง', 'มหาวิทยาลัยแม่โจ้'];
      populateDropdown('universityDropdown', allUniversities, selectUniversity);
      setupEventListeners();
      try { await liff.init({ liffId: "2007611527-z7ZNLXOk" }); } catch(e){}
    };

    function showLoading() { document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    async function callApi(endpoint, body) {
      const response = await fetch(`${API_BASE_URL}${endpoint}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...body, userId: userId })
      });
      return await response.json();
    }

    function setupEventListeners() {
      document.getElementById('searchUniversity').addEventListener('input', () => filterDropdown('universityDropdown', allUniversities, document.getElementById('searchUniversity').value, selectUniversity));
      document.getElementById('nextBtn1').addEventListener('click', () => goToStep(2));
      document.getElementById('nextBtn2').addEventListener('click', () => goToStep(3));
      document.getElementById('showTestsBtn').addEventListener('click', showTests);
    }

    function populateDropdown(id, list, callback) {
        const dd = document.getElementById(id);
        dd.innerHTML = '';
        if(!list.length) return;
        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'dropdown-option';
            div.textContent = item;
            div.onclick = () => callback(item);
            dd.appendChild(div);
        });
    }
    
    function filterDropdown(id, list, val, callback) {
        populateDropdown(id, list.filter(i => i.toLowerCase().includes(val.toLowerCase())), callback);
    }

    async function selectUniversity(uni) {
        selectedUniversity = uni;
        document.getElementById('searchUniversity').value = uni;
        goToStep(1); 
        document.getElementById('nextBtn1').disabled = false;
        try {
            const data = await callApi('/api/find_faculty', { name: uni });
            currentFaculties = data.faculties || [];
            populateDropdown('facultyDropdown', currentFaculties, selectFaculty);
        } catch(e) {}
    }

    async function selectFaculty(fac) {
        selectedFaculty = fac;
        document.getElementById('searchFaculty').value = fac;
        goToStep(2);
        document.getElementById('nextBtn2').disabled = false;
        try {
            const data = await callApi('/api/find_field', { name: selectedUniversity, faculty: fac });
            currentPrograms = data.faculties || []; 
            populateDropdown('programDropdown', currentPrograms, selectProgram);
        } catch(e) {}
    }

    function selectProgram(prog) {
        selectedProgram = prog;
        document.getElementById('searchProgram').value = prog;
        document.getElementById('showTestsBtn').disabled = false;
    }

    function goToStep(step) {
        [1,2,3].forEach(i => document.getElementById(`card${i}`).style.display = 'none');
        if (step <= 3) document.getElementById(`card${step}`).style.display = 'block';
        
        document.getElementById('testLinkContainer').style.display = 'none';
        document.getElementById('scoreInputContainer').style.display = 'none';
        document.getElementById('calculationContainer').style.display = 'none';
    }

    async function showTests() {
      showLoading();
      document.getElementById('card3').style.display = 'none';

      try {
        const data = await callApi('/api/get_program_weights', {
          university: selectedUniversity, faculty: selectedFaculty, field: selectedProgram
        });

        if (!data.found || !data.subjects) { alert("ไม่พบข้อมูล"); restart(); return; }

        requiredSubjectsCache = data.subjects;
        programMinScore = data.min_score || 0;
        isTScoreEnabled = data.t_score_enabled || false;
        
        const infoHtml = `<h3>📚 ${selectedProgram}</h3><p><strong>${selectedUniversity}</strong> | ${selectedFaculty}</p><p>เป้าหมาย (Safe): <strong>${programMinScore.toFixed(2)}</strong></p>`;
        ['programInfo', 'programInfo2', 'programInfo3'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.innerHTML = infoHtml;
        });

        const list = document.getElementById('testList');
        list.innerHTML = '';
        
        requiredSubjectsCache.forEach(item => {
            const name = SUBJECT_MAPPING[item.subject] || item.subject;
            const link = EXAM_LINKS[item.subject];
            let className = 'test-item';
            let clickAttr = '';
            if(link) {
                className += ' clickable';
                clickAttr = `onclick="window.open('${link}', '_blank')"`;
            }
            list.innerHTML += `
            <div class="${className}" ${clickAttr}>
                <div class="test-name">${name}</div>
                <div class="test-weight">น้ำหนัก: ${item.weight}%</div>
            </div>`;
        });

        document.getElementById('testLinkContainer').style.display = 'block';
      } catch (error) { console.error(error); alert("เกิดข้อผิดพลาด"); restart(); } 
      finally { hideLoading(); }
    }

    function goToScoreInput() {
        document.getElementById('testLinkContainer').style.display = 'none';
        showScoreInput();
    }

    function showScoreInput() {
      const list = document.getElementById('scoreInputList');
      list.innerHTML = '';
      requiredSubjectsCache.sort((a,b) => (a.subject==='gpax'?-1:1));

      requiredSubjectsCache.forEach(item => {
        const name = SUBJECT_MAPPING[item.subject] || item.subject;
        const isGpax = item.subject === 'gpax';
        const stats = item.stats;
        
        list.innerHTML += `
          <div class="score-input-item">
            <div class="score-input-top">
                <span class="score-label">${name}</span>
                <span class="score-weight">น้ำหนัก ${item.weight}%</span>
            </div>
            ${stats ? `<div class="score-stats">Avg: ${stats.mean} | SD: ${stats.sd}</div>` : ''}
            <input type="number" class="score-input-field" id="input_${item.subject}" 
                   placeholder="${isGpax ? '0-4.00' : '0-100'}" 
                   max="${isGpax ? 4 : 100}" step="${isGpax ? 0.01 : 1}">
          </div>`;
      });
      document.getElementById('scoreInputContainer').style.display = 'block';
    }

    function backToLinks() {
        document.getElementById('scoreInputContainer').style.display = 'none';
        document.getElementById('testLinkContainer').style.display = 'block';
    }
    
    function backToScoreInput() {
        document.getElementById('calculationContainer').style.display = 'none';
        document.getElementById('scoreInputContainer').style.display = 'block';
    }

    // --- 🚀 SAFE ITERATIVE LEVELING ALGORITHM ---
    function calculateSafeLeveling() {
      showLoading();
      
      let subjects = [];
      let totalCurrentWeighted = 0;
      
      // 1. Initial State
      requiredSubjectsCache.forEach(item => {
          const id = item.subject;
          const inputEl = document.getElementById(`input_${id}`);
          const raw = parseFloat(inputEl.value) || 0;
          const weight = item.weight || 0;
          const multiplier = (weight <= 1 && weight > 0) ? weight : weight / 100;
          const stats = item.stats || { mean: 50, sd: 15, multiplier: 1 };
          const maxRaw = (id === 'gpax') ? 4.00 : 100.00;

          // Z-Score for Badge
          let z = 0;
          let zText = "No Data";
          let zClass = "bg-gray";
          
          if(item.stats) {
              z = (raw - stats.mean) / stats.sd;
              if (z < -1) { zText = "Low"; zClass = "bg-red"; }
              else if (z < 0) { zText = "Avg-"; zClass = "bg-orange"; }
              else if (z < 1) { zText = "Avg+"; zClass = "bg-green"; }
              else { zText = "Good"; zClass = "bg-blue"; }
          }

          // Weighted Score Calculation
          let contribution = 0;
          if(isTScoreEnabled && item.stats) {
              let t = 50 + (stats.multiplier * z);
              contribution = t * multiplier;
          } else {
              contribution = raw * multiplier;
          }
          totalCurrentWeighted += contribution;

          subjects.push({
              id: id, name: SUBJECT_MAPPING[id] || id,
              raw: raw, weight: weight, multiplier: multiplier,
              stats: item.stats, contribution: contribution, maxRaw: maxRaw,
              targetRaw: raw, z: z, zText: zText, zClass: zClass, 
              isFixed: (id === 'gpax')
          });
      });

      const gap = programMinScore - totalCurrentWeighted;
      const isPassing = gap <= 0;

      // 2. ITERATIVE FILLING (Add 1 point step-by-step)
      if (!isPassing && gap > 0) {
          let currentWeightedScore = totalCurrentWeighted;
          let iterations = 0;
          let safetyBreak = 2000; 

          while(currentWeightedScore < programMinScore && iterations < safetyBreak) {
              let bestCandidate = null;
              let minZ = 999;

              subjects.forEach(s => {
                  if(!s.isFixed && s.targetRaw < s.maxRaw) {
                      let currentZ = 0;
                      if(s.stats) currentZ = (s.targetRaw - s.stats.mean) / s.stats.sd;
                      else currentZ = (s.targetRaw - 50) / 15;

                      if(currentZ < minZ) {
                          minZ = currentZ;
                          bestCandidate = s;
                      }
                  }
              });

              if(!bestCandidate) break;

              let step = (bestCandidate.id === 'gpax') ? 0.01 : 1.0;
              bestCandidate.targetRaw += step;
              if(bestCandidate.targetRaw > bestCandidate.maxRaw) bestCandidate.targetRaw = bestCandidate.maxRaw;

              // Calculate Weighted Gain
              let gain = 0;
              if(isTScoreEnabled && bestCandidate.stats) {
                  let deltaZ = step / bestCandidate.stats.sd;
                  let deltaT = bestCandidate.stats.multiplier * deltaZ;
                  gain = deltaT * bestCandidate.multiplier;
              } else {
                  gain = step * bestCandidate.multiplier;
              }
              currentWeightedScore += gain;
              iterations++;
          }
      }

      // Render
      let tableRows = "";
      subjects.forEach(s => {
          let diff = s.targetRaw - s.raw;
          let diffHtml = "-";
          let targetHtml = `<span style="color:#888">${s.raw.toFixed(2)}</span>`;
          
          if(!isPassing && diff > 0.1) {
              targetHtml = `<span class="target-val">${s.targetRaw.toFixed(0)}</span>`;
              diffHtml = `<span class="col-diff positive">+${diff.toFixed(0)}</span>`;
          } else if (isPassing) {
              diffHtml = `<span class="col-diff negative">✓</span>`;
          }

          const link = EXAM_LINKS[s.id];
          const linkBtn = link ? `<a href="${link}" target="_blank" class="btn-test-link active">📝</a>` : ``;

          tableRows += `
            <tr>
                <td>
                    ${s.name} ${linkBtn}
                    <div style="font-size:0.75rem; color:#999;">
                        Z: ${s.z.toFixed(2)} 
                        <span class="z-badge ${s.zClass}">${s.zText}</span>
                    </div>
                </td>
                <td class="col-score">${s.raw.toFixed(2)}</td>
                <td>${(s.weight).toFixed(0)}%</td>
                <td class="target-cell">${targetHtml}</td>
                <td style="font-weight:bold;">${diffHtml}</td>
            </tr>
          `;
      });

      const summaryClass = isPassing ? "" : "summary-fail";
      const summaryText = isPassing ? "ยินดีด้วย! สอบผ่าน" : `ขาดอีก ${gap.toFixed(2)} คะแนน`;

      document.getElementById('calculationResults').innerHTML = `
        <div class="summary-box ${summaryClass}">
            <div>${summaryText}</div>
            <div class="summary-score">${totalCurrentWeighted.toFixed(2)}</div>
            <div style="font-size:0.9rem;">เป้าหมาย (Safe): <strong>${programMinScore.toFixed(2)}</strong></div>
            ${!isPassing ? '<div style="margin-top:10px; font-size:0.8rem; color:#d32f2f;">*ระบบคำนวณเพิ่มคะแนนทีละ 1 คะแนนในวิชาที่อ่อนที่สุดจนครบเกณฑ์</div>' : ''}
        </div>
        <table class="results-table">
            <thead>
                <tr>
                    <th>วิชา</th>
                    <th>คะแนน</th>
                    <th>นน.</th>
                    <th>เป้าหมาย</th>
                    <th>เพิ่ม</th>
                </tr>
            </thead>
            <tbody>${tableRows}</tbody>
        </table>
      `;

      document.getElementById('scoreInputContainer').style.display = 'none';
      document.getElementById('calculationContainer').style.display = 'block';
      hideLoading();
    }

    function restart() {
      document.getElementById('searchUniversity').value = '';
      goToStep(1);
      document.getElementById('testLinkContainer').style.display = 'none'; 
      document.getElementById('scoreInputContainer').style.display = 'none';
      document.getElementById('calculationContainer').style.display = 'none';
      document.getElementById('card1').style.display = 'block';
    }
  </script>
</body>
</html>
