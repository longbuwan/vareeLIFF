<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Under Development</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; }
    body { 
      background: linear-gradient(135deg, #0288d1 0%, #01579b 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 20px;
      color: #333;
    }
    .container { 
      background: white; 
      border-radius: 20px; 
      padding: 40px 30px; 
      text-align: center; 
      max-width: 500px; 
      width: 100%; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
    }
    .icon { font-size: 4rem; margin-bottom: 20px; display: block; }
    h1 { color: #01579b; margin-bottom: 10px; font-weight: 600; }
    p { color: #666; line-height: 1.6; margin-bottom: 30px; }
    .btn { 
      display: inline-block; 
      background: #0288d1; 
      color: white; 
      text-decoration: none; 
      padding: 12px 30px; 
      border-radius: 50px; 
      font-weight: 600; 
      transition: 0.2s; 
    }
    .btn:hover { background: #01579b; }
  </style>
</head>
<body>

  <div class="container">
    <span class="icon">🚧</span>
    <h1>กำลังปรับปรุงระบบ</h1>
    <p>
      ขออภัยในความไม่สะดวก<br>
      เรากำลังพัฒนาหน้านี้เพื่อให้ใช้งานได้ดียิ่งขึ้น<br>
      โปรดกลับมาใช้งานใหม่ในภายหลัง
    </p>
    <a href="javascript:history.back()" class="btn">ย้อนกลับ</a>
  </div>

</body>
</html>
